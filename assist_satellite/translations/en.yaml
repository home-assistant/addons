---
configuration:
  name:
    name: Name
    description: >-
      Friendly name for this satellite shown in Home Assistant. Leave empty to
      auto-generate a name based on the device MAC address.
  port:
    name: Port
    description: >-
      TCP port the ESPHome satellite server listens on (default: 6053).
  audio_input_device:
    name: Audio input device
    description: >-
      Soundcard name or index for the microphone input. Leave empty to use the
      system default microphone. Run with debug logging to list available
      devices.
  audio_output_device:
    name: Audio output device
    description: >-
      mpv audio device name for sound output. Leave empty to use the system
      default output. Run with debug logging to list available devices.
  wake_word:
    name: Wake word
    description: >-
      ID of the wake word model to activate the assistant (default:
      okay_nabu). The available wake words are determined by the models
      bundled with the image or downloaded from Home Assistant.
  refractory_seconds:
    name: Refractory period
    description: >-
      Minimum seconds between wake word activations to prevent accidental
      double-triggers (default: 2.0).
  enable_thinking_sound:
    name: Thinking sound
    description: >-
      Play a short processing sound while the assistant is thinking. Can also
      be toggled at runtime from the Home Assistant device page.
  debug_logging:
    name: Debug logging
    description: >-
      Enable verbose debug logging.
  processing_sound:
    name: Processing sound
    description: >-
      Path to a custom sound file to play while the assistant is processing a
      command. The default sound is a short chime included with linux voice assistant.
  stop_word:
    name: Stop word
    description: >-
      Wake word to stop the assistant from listening or speaking (default: stop).
  timer_sound:
    name: Timer sound
    description: >-
      Path to a custom sound file to play when a timer finishes. The default is included with linux voice assistant.
  timer_max_ring_seconds:
    name: Timer max ring seconds
    description: >-
      Maximum seconds to ring the timer sound when a timer finishes.
  mic_volume:
    name: Microphone volume
    description: >-
      Microphone input volume.
  mic_noise_suppression:
    name: Microphone noise suppression
    description: >-
      Level of noise suppression to apply to the microphone input (0-4, default: 0).
  mic_auto_gain:
    name: Microphone auto gain
    description: >-
      Level of automatic gain control to apply to the microphone input (0-31, default: 0).